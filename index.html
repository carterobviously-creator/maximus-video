<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maximus Video — Bonsai</title>
<style>
  body {
    margin: 0;
    background: #050505;
    color: #eee;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 900px;
    background: #0b0b0f;
    border: 1px solid #1a1a22;
    border-radius: 16px;
    padding: 20px;
  }

  .title {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
  }

  textarea {
    width: 100%;
    height: 120px;
    background: #0f0f15;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 12px;
    color: #eee;
    font-size: 14px;
    resize: vertical;
  }

  button {
    margin-top: 14px;
    padding: 10px 18px;
    background: #4f6bff;
    border: none;
    border-radius: 999px;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }

  button:hover {
    filter: brightness(1.1);
  }

  .status {
    margin-top: 12px;
    font-size: 13px;
    color: #aaa;
  }

  canvas {
    margin-top: 20px;
    border-radius: 12px;
    border: 1px solid #222;
    background: black;
    width: 100%;
    height: 512px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="title">Maximus Video</div>
  <div class="subtitle">Bonsai WebGPU Animation Engine</div>

  <textarea id="prompt" placeholder="Describe your scene..."></textarea>
  <button onclick="generate()">Generate</button>

  <div class="status" id="status">Waiting…</div>

  <canvas id="canvas" width="512" height="512"></canvas>
</div>

<script>
const BONSAI_API = "https://prism-ml-bonsai-demo.hf.space/run/text_to_bonsai";

async function generate() {
  const prompt = document.getElementById("prompt").value.trim();
  const status = document.getElementById("status");

  if (!prompt) {
    status.textContent = "Enter a prompt first.";
    return;
  }

  status.textContent = "Generating JSON (Bonsai 300 t/s)…";

  const res = await fetch(BONSAI_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ data: [prompt] })
  });

  const data = await res.json();

  // Correct field:
  const bonsaiJSON = data.data[0].bonsai;

  status.textContent = "Rendering animation…";

  // Load Bonsai renderer
  const script = document.createElement("script");
  script.src = "https://prism-ml.github.io/bonsai/bonsai.js";
  script.onload = () => {
    const canvas = document.getElementById("canvas");
    const engine = new Bonsai.Engine(canvas);
    engine.load(bonsaiJSON);
    engine.play();
    status.textContent = "Done.";
  };
  document.body.appendChild(script);
}
</script>

</body>
</html>
