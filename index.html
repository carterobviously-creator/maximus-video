<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maximus Video — Tiny NN</title>
<style>
  body {
    margin: 0;
    background: #050505;
    color: #eee;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  .container {
    width: 900px;
    background: #0b0b0f;
    border: 1px solid #1a1a22;
    border-radius: 16px;
    padding: 20px;
  }
  .title { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
  textarea {
    width: 100%; height: 80px;
    background: #0f0f15; border: 1px solid #222;
    border-radius: 10px; padding: 10px;
    color: #eee; font-size: 13px; resize: vertical;
  }
  button {
    margin-top: 14px; padding: 10px 18px;
    background: #4f6bff; border: none;
    border-radius: 999px; color: white;
    font-size: 14px; cursor: pointer;
  }
  button:hover { filter: brightness(1.1); }
  .status { margin-top: 12px; font-size: 13px; color: #aaa; }
  canvas {
    margin-top: 20px;
    border-radius: 12px;
    border: 1px solid #222;
    background: black;
    width: 100%; height: 512px;
  }
  a.download {
    display: block; margin-top: 10px;
    color: #4f6bff; font-size: 14px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="title">Maximus Video</div>
  <div class="subtitle">Tiny neural net procedural video (unlimited)</div>

  <textarea id="prompt" placeholder="Prompt used as a seed for the neural net..."></textarea>
  <button onclick="generate()">Generate 5s clip</button>

  <div class="status" id="status">Idle.</div>

  <canvas id="canvas" width="512" height="512"></canvas>
  <a id="download" class="download" style="display:none;" download="maximus-nn.webm">Download video</a>
</div>

<script>
// --- simple hash → seed ---
function hashString(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function makeRNG(seed) {
  return function() {
    seed ^= seed << 13;
    seed ^= seed >>> 17;
    seed ^= seed << 5;
    return (seed >>> 0) / 4294967296;
  };
}

// --- tiny MLP: 4 → 16 → 3 ---
function makeTinyNet(seed) {
  const rand = makeRNG(seed);
  function randn() { return (rand() * 2 - 1) * 0.8; }

  const W1 = new Float32Array(4 * 16);
  const b1 = new Float32Array(16);
  const W2 = new Float32Array(16 * 3);
  const b2 = new Float32Array(3);

  for (let i = 0; i < W1.length; i++) W1[i] = randn();
  for (let i = 0; i < 16; i++) b1[i] = randn();
  for (let i = 0; i < W2.length; i++) W2[i] = randn();
  for (let i = 0; i < 3; i++) b2[i] = randn();

  return function forward(x, y, t, s) {
    const h = new Float32Array(16);
    for (let j = 0; j < 16; j++) {
      let v = b1[j];
      v += W1[0 * 16 + j] * x;
      v += W1[1 * 16 + j] * y;
      v += W1[2 * 16 + j] * t;
      v += W1[3 * 16 + j] * s;
      h[j] = Math.tanh(v);
    }
    const out = new Float32Array(3);
    for (let k = 0; k < 3; k++) {
      let v = b2[k];
      for (let j = 0; j < 16; j++) {
        v += W2[j * 3 + k] * h[j];
      }
      out[k] = 1 / (1 + Math.exp(-v)); // sigmoid → [0,1]
    }
    return out;
  };
}

async function generate() {
  const status = document.getElementById("status");
  const dl = document.getElementById("download");
  dl.style.display = "none";

  const prompt = document.getElementById("prompt").value.trim();
  const seed = hashString(prompt || String(Math.random()));
  const net = makeTinyNet(seed);

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const fps = 24;
  const durationSec = 5;
  const totalFrames = fps * durationSec;

  const stream = canvas.captureStream(fps);
  const recorder = new MediaRecorder(stream, { mimeType: "video/webm" });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  const done = new Promise(resolve => { recorder.onstop = () => resolve(); });

  recorder.start();
  status.textContent = "Rendering frames with tiny neural net…";

  const W = canvas.width;
  const H = canvas.height;
  const img = ctx.createImageData(W, H);

  for (let frame = 0; frame < totalFrames; frame++) {
    const t = frame / totalFrames; // 0 → 1
    const s = (seed % 1000) / 1000;

    let idx = 0;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const nx = (x / W) * 2 - 1;
        const ny = (y / H) * 2 - 1;
        const out = net(nx, ny, t, s);
        img.data[idx++] = out[0] * 255;
        img.data[idx++] = out[1] * 255;
        img.data[idx++] = out[2] * 255;
        img.data[idx++] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    await new Promise(r => setTimeout(r, 1000 / fps));
  }

  recorder.stop();
  await done;

  const blob = new Blob(chunks, { type: "video/webm" });
  const url = URL.createObjectURL(blob);
  dl.href = url;
  dl.style.display = "block";
  status.textContent = "Done. Download ready.";
}
</script>

</body>
</html>
